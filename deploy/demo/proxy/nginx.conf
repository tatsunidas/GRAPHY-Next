# cloudflared と graphy-backend の間に挟む薄いリバースプロキシ。
# graphy-backend が落ちている（デプロイ・夜間リセット中・クラッシュ）場合、502/503/504を
# 検知して静的な maintenance.html へ自動フォールバックする。
server {
    listen 80 default_server;
    server_name _;

    # Docker 埋め込み DNS（127.0.0.11）で graphy-backend を都度解決する。proxy_pass に静的ホスト名を
    # 直書きすると nginx は起動時に一度だけ解決した IP をワーカー寿命いっぱいキャッシュするため、
    # graphy-backend コンテナだけを再作成（再デプロイ）した際に IP が変わると本コンテナの再起動なしには
    # connection refused → maintenance.html 固着になる（実際に発生した障害）。$backend 変数越しに
    # proxy_pass することで resolver の TTL（10s）ごとに再解決させ、再起動不要で追従させる。
    resolver 127.0.0.11 valid=10s;

    proxy_intercept_errors on;
    error_page 502 503 504 =503 /maintenance.html;

    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
        add_header Retry-After 60 always;
    }

    location / {
        set $backend "http://graphy-backend:8090";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # cloudflared -> nginx はトンネル内部の平文 HTTP のため、ここでの $scheme は常に "http"。
        # 公開ホスト名は Cloudflare 側で必ず https 終端されるため固定値で渡す（$scheme を使うと
        # backend が自身のスキームを http と誤認し、https の Origin と不一致で CORS 拒否になる）。
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 3s;
        proxy_read_timeout 60s;
    }
}
