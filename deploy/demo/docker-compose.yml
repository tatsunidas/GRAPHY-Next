# 公開デモ用の完全なスタック定義（dcm4chee-arc ＋ GRAPHY-Next backend ＋ proxy ＋ cloudflared）。
# 開発検証用の deploy/dcm4chee/docker-compose.yml とは別ファイル
# （あちらはローカルの手動検証向け、こちらは公開デモの本番構成）。
#
# ネットワーク設計:
#   demo_internal は internal: true。ldap/db/arc/graphy-backend/proxy/cloudflared は全員この中にいて、
#   コンテナ間通信はここで完結する。internal ネットワークは「ホストへの ports: publish」もできない
#   （Docker の制約。当初 graphy-backend に ports: を張って動作確認したが host 側に反映されず、
#   internal + 個別ポート公開は両立しないと判明。→ ports: は使わない設計に変更）。
#
#   cloudflared だけ demo_edge（通常の bridge、外部到達可）にも参加し、Cloudflare のエッジへ
#   アウトバウンド接続する。cloudflared → proxy（nginx） → graphy-backend は demo_internal 内の
#   Docker DNS で到達し、ホストの ports: publish は不要。proxy は graphy-backend が落ちている
#   （デプロイ中・夜間リセット中・クラッシュ）場合、502/503/504 を検知して静的な
#   maintenance.html へ自動フォールバックする（deploy/demo/proxy/ 参照）。
#
#   → graphy-backend コンテナ自体はどのネットワークからもインターネットへの経路を持たない。
#     DemoModeFilter に見落としがあっても、backend から外部への任意の DICOM送信・通信は
#     ネットワーク層で物理的に不可能。
#
#   arc の管理UI(8080)はデバッグ用に demo_debug（127.0.0.1 のみ bind）へ個別に公開。
#
# 使い方:
#   docker compose -f deploy/demo/docker-compose.yml build graphy-backend
#   docker compose -f deploy/demo/docker-compose.yml up -d
#   docker compose -f deploy/demo/docker-compose.yml logs -f cloudflared   # 発行されたURLを確認

networks:
  demo_internal:
    internal: true
  demo_edge: {}
  demo_debug: {}

services:
  ldap:
    image: dcm4che/slapd-dcm4chee:2.6.7-33.1
    networks: [demo_internal]
    logging:
      driver: json-file
      options:
        max-size: "10m"
    environment:
      STORAGE_DIR: /storage/fs1
    volumes:
      - ./data/ldap:/var/lib/openldap/openldap-data
      - ./data/slapd.d:/etc/openldap/slapd.d

  db:
    image: dcm4che/postgres-dcm4chee:17.1-33
    networks: [demo_internal]
    logging:
      driver: json-file
      options:
        max-size: "10m"
    environment:
      POSTGRES_DB: pacsdb
      POSTGRES_USER: pacs
      POSTGRES_PASSWORD: pacs
    volumes:
      - ./data/db:/var/lib/postgresql/data

  arc:
    image: dcm4che/dcm4chee-arc-psql:5.33.1
    networks: [demo_internal, demo_debug]
    logging:
      driver: json-file
      options:
        max-size: "10m"
    ports:
      # 管理UI/DICOMwebはホストloopbackのみ（外部非公開、デバッグ用）
      - "127.0.0.1:8080:8080"
    environment:
      WILDFLY_CHOWN: /opt/wildfly/standalone /storage
      WILDFLY_WAIT_FOR: ldap:389 db:5432
      JAVA_OPTS: -Xms1024m -Xmx16384m -XX:MetaspaceSize=96M -XX:MaxMetaspaceSize=384m -Djava.net.preferIPv4Stack=true
    depends_on:
      - ldap
      - db
    volumes:
      - ./data/storage:/storage
      - ./data/wildfly:/opt/wildfly/standalone

  graphy-backend:
    build:
      context: ../..
      dockerfile: deploy/demo/Dockerfile
    networks: [demo_internal]
    environment:
      GRAPHY_DICOM_DICOMWEB_BASE_URL: http://arc:8080/dcm4chee-arc/aets/DCM4CHEE/rs
      # マジックリンクログインゲート（AuthFilter, graphy.auth.*）。
      # session-secret/internal-api-key はシークレットのため .env から注入する
      # （生成例: openssl rand -base64 32）。internal-api-key は mailer 側と同じ値にすること。
      GRAPHY_AUTH_SESSION_SECRET: ${GRAPHY_AUTH_SESSION_SECRET}
      GRAPHY_AUTH_INTERNAL_API_KEY: ${GRAPHY_AUTH_INTERNAL_API_KEY}
      GRAPHY_AUTH_MAILER_BASE_URL: http://mailer:8081
      GRAPHY_AUTH_TURNSTILE_SITE_KEY: ${GRAPHY_AUTH_TURNSTILE_SITE_KEY}
      GRAPHY_AUTH_PUBLIC_BASE_URL: https://demo.vis-ionary.com
      # graphy.vis-ionary.com（Xserver, subscribe.php）からの POST /subscribe を認証する共有鍵。
      # Xserver側にも同じ値を配置する（website/public/api/subscribe.php参照）。
      GRAPHY_AUTH_SUBSCRIBE_API_KEY: ${GRAPHY_AUTH_SUBSCRIBE_API_KEY}
    depends_on:
      - arc
      - mailer
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    volumes:
      - graphy_backend_data:/app/data
    restart: unless-stopped

  # graphy-backend にインターネット疎通を持たせないための、メール送信/CAPTCHA検証専用の中継。
  # demo_internal（graphy-backendからの内部APIコールを受ける）と demo_edge（外部SMTP・
  # Cloudflare Turnstile siteverifyへ到達するため）の両方に属する唯一のアプリ側コンテナ。
  # トークン・メール本文の意味・DICOM等は一切知らない薄い中継に留める（deploy/demo/mailer/参照）。
  mailer:
    build:
      context: ./mailer
    networks: [demo_internal, demo_edge]
    environment:
      INTERNAL_API_KEY: ${GRAPHY_AUTH_INTERNAL_API_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    read_only: true
    tmpfs:
      - /tmp
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  # graphy-backend が落ちている（デプロイ中・夜間リセット中・クラッシュ）場合に、cloudflared からの
  # リクエストを静的な maintenance.html へ自動フォールバックさせる薄いリバースプロキシ。
  # cloudflared の Public Hostname ターゲットは graphy-backend:8090 ではなく http://proxy:80 を指すよう
  # Cloudflare ダッシュボード側で設定すること。
  proxy:
    image: nginx:alpine
    networks: [demo_internal]
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./proxy/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
    depends_on:
      - graphy-backend
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    # named tunnel（本番）: トークンは deploy/demo/.env の TUNNEL_TOKEN から注入する
    # （cloudflared は TUNNEL_TOKEN 環境変数を自動で読む）。ルーティング先
    # （demo.vis-ionary.com → http://proxy:80、proxy が graphy-backend:8090 へ中継し
    # 落ちていれば maintenance.html を返す）は Cloudflare ダッシュボードの Public Hostname
    # 側で指定するため、ここでは --url を渡さない。
    #
    # Quick Tunnel（旧・使い捨てURL）に戻したい場合は下記1行に差し替える:
    #   command: tunnel --no-autoupdate --url http://proxy:80
    command: tunnel --no-autoupdate run
    env_file:
      - .env
    networks: [demo_internal, demo_edge]
    depends_on:
      - proxy
    restart: unless-stopped

volumes:
  graphy_backend_data:
