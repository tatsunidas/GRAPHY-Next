# GRAPHY-Next standalone SCP が C-STORE で受理する Storage SOP Class 一覧。
#
# 形式: <SOPClassKeyword> = <TransferSyntaxKeyword>[,...]  または  *
#   - キーは dcm4che の UID キーワード（org.dcm4che3.data.UID.forName で解決）。生UIDも可。
#   - 値 "*" は「任意の Transfer Syntax を受理」（圧縮含む）。
#
# 方針: all-storage("*"/"*") は使わない。SOPクラスを明示列挙することで、
#       将来の C-GET/C-MOVE SCP（具体的な SOP Class 提示が必要）と整合させる。
#       TS は "*" で受信は寛容に（圧縮オブジェクトもそのまま保存し、表示時に復号）。

# --- 投影/CR/DX/MG ---
ComputedRadiographyImageStorage=*
DigitalXRayImageStorageForPresentation=*
DigitalXRayImageStorageForProcessing=*
DigitalMammographyXRayImageStorageForPresentation=*
DigitalMammographyXRayImageStorageForProcessing=*
BreastTomosynthesisImageStorage=*

