# demo プロファイル: 公開デモ用の追加ガード。
# `web` と併用で起動する（--spring.profiles.active=web,demo）。
# DemoModeFilter がこのフラグを見て、インポート/エクスポート/外部DICOM通信/DB管理系/
# サーバー内部操作を一律 403 にする（詳細は DemoModeFilter のコメント参照）。
graphy:
  demo:
    enabled: true
  ratelimit:
    enabled: true
    requests-per-minute: 300
  # マジックリンクによるログインゲート（AuthFilter）。
  # session-secret / internal-api-key / mailer-base-url / turnstile-site-key / public-base-url は
  # シークレット・環境固有値のためここには書かず、docker-compose の environment
  # （deploy/demo/.env 由来、例: GRAPHY_AUTH_SESSION_SECRET）から relaxed binding で束縛する。
  #
  # Demoモード（DemoModeFilter）の検証中のため一時的に無効化。検証完了後にtrueへ戻す。
  auth:
    enabled: false
    token-ttl-minutes: 15
    session-ttl-days: 30
