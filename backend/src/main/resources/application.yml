# GRAPHY-Next backend 共通設定
# プロファイル未指定時は web で起動する。
spring:
  application:
    name: graphy-next-backend
  profiles:
    default: web
  datasource:
    url: jdbc:h2:file:./data/graphy-index;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      # プラグイン zip（JAR 同梱で 1MB を超えうる）のオフライン導入に備え既定 1MB から引き上げ。
      # fw/plugin-manager-design.md（POST /api/plugin-manager/install/file）。
      max-file-size: 128MB
      max-request-size: 128MB

server:
  port: 8080
  # リバースプロキシ配下（deploy/demo の nginx 等）で X-Forwarded-Proto/Host を信頼する。
  # 無いと Tomcat が自身のスキームを常に http と認識し、https 経由のブラウザからの Origin
  # ヘッダ（scheme 不一致）を同一オリジンと判定できず、CORS 未設定オリジン扱いで
  # 403 "Invalid CORS request" になる（POST 等 Origin を送るリクエストで発生）。
  # プロキシが無い（standalone 直起動）場合は X-Forwarded-* が来ないため無害。
  forward-headers-strategy: framework

# StatusController が返すバージョン。
# '@project.version@' は Maven のリソースフィルタで pom.xml の <version> に置換される
# （spring-boot-starter-parent が application.yml のフィルタリングを既定で有効化）。
# → pom.xml が唯一のソース。frontend/desktop は scripts/set-version.mjs で同期する。
graphy:
  version: '@project.version@'
  # プラグイン格納フォルダ（standalone）。読取専用バンドルを避け書込可能な場所を指す。
  plugins:
    dir: ./plugins
    # プラグインマネージャ（取得・導入・更新・削除）。既定 false＝閲覧のみ。
    # standalone かつ true のときだけ導入操作を許可する（web は運営キュレーション前提で 403）。
    # 設計: fw/plugin-manager-design.md。
    manager-enabled: false
    # private リポジトリの列挙・資産取得に使う GitHub トークン（任意・PAT）。未設定なら公開のみ。
    # github-token: ghp_xxx
    # 公式キュレーション索引 URL（raw JSON・将来の discovery 用・任意）。
    # index-url: https://raw.githubusercontent.com/vis-ionary/graphy-plugins-index/main/index.json
  cors:
    # /api/** に対する許可オリジン（dev の Vite と Electron file://=null を想定）
    allowed-origin-patterns:
      - "http://localhost:*"
      - "http://127.0.0.1:*"
      - "null"
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
  dicom:
    # 自局 AE タイトル / SCP ポート・バインドアドレスの既定値。環境設定「DICOM通信」＞「自局」から
    # 編集すると Settings(H2) に保存され、こことは独立にこちらの値を上書きする（DicomLocalAeService）。
    # AE タイトルは発信（C-ECHO/C-STORE/C-FIND/C-MOVE）に即時反映、SCP リスナーはアプリ再起動後に反映。
    local-ae-title: GRAPHYNEXT
    storage-dir: ./data/dicom
    scp:
      enabled: false      # 既定は無効（web モード）。standalone で有効化する。
      port: 11112
      bind-address: 0.0.0.0
    tls:
      enabled: false      # 相互TLS。key-store/trust-store を設定して有効化。
      port: 2762
      key-store: ""
      key-store-password: ""
      key-store-type: PKCS12
      trust-store: ""
      trust-store-password: ""
      trust-store-type: PKCS12
      need-client-auth: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    # 既定は INFO。トラブル時は com.vis.graphynext を DEBUG にすると
    # リスク箇所（外部ツール起動・DICOMweb 通信・ファイル I/O 等）の詳細が出る。
    com.vis.graphynext: INFO
