# standalone プロファイル: Electron デスクトップアプリモード
# 将来: 組み込み DICOM サーバー / H2 索引 / ローカル FS の設定をここに追加。
graphy:
  mode-description: "Standalone desktop mode (Electron, embedded resources)"
  dicom:
    scp:
      enabled: true       # ローカル DIMSE リスナー（C-ECHO 応答）を起動
    # DICOM Send（C-STORE）/ C-MOVE 宛先の候補。送信ダイアログのドロップダウンに出る。
    # 送信ダイアログでは手動入力もできるため、未設定でも送信は可能。
    # remote-aes:
    #   - ae-title: DCM4CHEE
    #     host: 127.0.0.1
    #     port: 11112
    #   - ae-title: ORTHANC
    #     host: 192.168.1.50
    #     port: 4242

# NonDicomImporter の動画(AVI/非H.264 MP4)トランスコード用 ffmpeg。
# 既定（空）の場合、FfmpegLocator が同梱物を自動探索する:
#   jar 隣接の ffmpeg/ ・ ../ffmpeg/（Electron: resources/ffmpeg）→ <os-arch>/ffmpeg[.exe]
# 明示パスや同梱ディレクトリを指定したい場合のみ設定する（環境変数 GRAPHY_FFMPEG / GRAPHY_FFMPEG_DIR も可）。
nondicom:
  ffmpeg: ""        # 実行ファイルの明示パス（例 C:\\tools\\ffmpeg.exe）
  ffmpeg-dir: ""    # 同梱ディレクトリ（<os-arch>/ffmpeg[.exe] または直下に ffmpeg[.exe]）
