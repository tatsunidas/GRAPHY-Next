<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GRAPHY Portable 2D Viewer</title>
  </head>
  <body>
    <div id="app">
      <header id="toolbar">
        <span id="brand">GRAPHY Portable 2D Viewer</span>
        <button id="pick-btn" type="button">フォルダを選択</button>
        <span class="sep"></span>
        <button id="fit-btn" type="button" title="ウィンドウに合わせる">Fit</button>
        <button id="actual-btn" type="button" title="実寸 (1:1)">1:1</button>
        <button id="rotate-btn" type="button" title="90°回転">⟳</button>
        <button id="fliph-btn" type="button" title="左右反転">⇋</button>
        <button id="flipv-btn" type="button" title="上下反転">⇅</button>
        <button id="invert-btn" type="button" title="諧調反転（白黒反転）">Inv</button>
        <button id="reset-btn" type="button" title="表示を完全リセット">リセット</button>
        <span class="sep"></span>
        <button class="layout-btn active" data-layout="1x1" type="button" title="1画面">▢</button>
        <button class="layout-btn" data-layout="2x1" type="button" title="左右2分割">▢▢</button>
        <button class="layout-btn" data-layout="2x2" type="button" title="2×2分割">⊞</button>
        <input id="folder-input" type="file" webkitdirectory directory multiple hidden />
        <span id="status" data-kind="info"></span>
      </header>
      <header id="toolbar2">
        <label class="ctl" title="W/L プリセット">
          W/L
          <select id="wl-preset">
            <option value="">既定 (DICOM)</option>
          </select>
        </label>
        <label class="ctl" title="ウィンドウ幅">WW <input id="ww-input" type="number" step="1" /></label>
        <label class="ctl" title="ウィンドウ中心">WL <input id="wc-input" type="number" step="1" /></label>
        <button id="wl-set-btn" type="button" title="W/L を適用">設定</button>
        <span class="sep"></span>
        <button id="png-btn" type="button" title="現在ビューを PNG 保存">PNG 保存</button>
        <span class="sep"></span>
        <span class="grp-label">計測</span>
        <button class="measure-btn active" data-tool="" type="button" title="操作（W/L・選択）">選択</button>
        <button class="measure-btn" data-tool="Length" type="button" title="長さ (mm)">長さ</button>
        <button class="measure-btn" data-tool="Angle" type="button" title="角度 (°)">角度</button>
        <button class="measure-btn" data-tool="EllipticalROI" type="button" title="楕円 ROI（面積・平均/SD）">楕円</button>
        <button class="measure-btn" data-tool="RectangleROI" type="button" title="矩形 ROI（面積・平均/SD）">矩形</button>
        <button class="measure-btn" data-tool="Probe" type="button" title="プローブ（点の値）">プローブ</button>
        <button id="clear-annot-btn" type="button" title="計測をすべて消去">クリア</button>
      </header>
      <div id="body">
        <aside id="sidebar">
          <div id="tree"></div>
        </aside>
        <main id="stage">
          <div id="grid"></div>
          <div id="cinebar" hidden>
            <button id="play-btn" type="button" title="シネ再生 / 停止">▶</button>
            <input id="slice-slider" type="range" min="0" max="0" value="0" step="1" />
            <span id="slice-label">0 / 0</span>
            <label class="ctl" title="再生速度">fps <input id="fps-input" type="number" min="1" max="60" step="1" value="12" /></label>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
