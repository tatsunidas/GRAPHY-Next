<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GRAPHY — 準備中</title>
    <meta name="description" content="GRAPHY のサイトは準備中です。まもなく公開します。" />
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: "Inter", system-ui, -apple-system, "Noto Sans JP", "Meiryo", sans-serif;
        color: #0f172a;
        background:
          radial-gradient(900px 480px at 15% -10%, rgba(34,211,238,.18), transparent 60%),
          radial-gradient(800px 480px at 100% 0%, rgba(124,92,255,.20), transparent 55%),
          #ffffff;
        padding: 1.5rem;
      }
      .card { text-align: center; max-width: 480px; }
      .mark {
        width: 96px; height: 96px; margin: 0 auto 1.25rem; display: block;
        background: #fff; border-radius: 20px; padding: 12px;
        box-shadow: 0 20px 50px -18px rgba(15,23,42,.25); border: 1px solid #e5e9f0;
      }
      h1 { font-size: 2rem; margin: 0 0 .25rem; letter-spacing: .02em; }
      .sub {
        font-weight: 700; font-size: .9rem; letter-spacing: .14em; text-transform: uppercase;
        color: #0891b2; margin: 0 0 1rem;
      }
      p { color: #556074; line-height: 1.7; margin: 0 0 1.5rem; }
      .links { display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; }
      a.button {
        display: inline-block; padding: .6rem 1.1rem; border-radius: 999px; font-weight: 700;
        text-decoration: none; font-size: .92rem; border: 1px solid #e5e9f0; color: #0f172a;
      }
      a.button--primary {
        background: linear-gradient(120deg, #0891b2, #6d4bff); color: #fff; border-color: transparent;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="mark" src="/graphy-icon.png" alt="GRAPHY" width="96" height="96" />
      <h1>GRAPHY</h1>
      <p class="sub">準備中 / Coming soon</p>
      <p>
        次世代 DICOM ワークステーション「GRAPHY」のサイトを準備しています。<br />
        まもなく公開します。
      </p>
      <div class="links">
        <a class="button button--primary" href="https://vis-ionary.com">会社サイトへ</a>
        <a class="button" href="https://github.com/tatsunidas/GRAPHY-Next" rel="noopener">GitHub</a>
      </div>
    </main>
  </body>
</html>
