name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Web 配布物: UI を同梱した実行可能 jar
  web-jar:
    name: Web jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build web jar (UI 同梱 / frontend は Maven が内部ビルド)
        working-directory: backend
        # パッケージング工程はテストをスキップ（テストのゲートは ci.yml が担う）。
        run: mvn -B -DskipTests clean package
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: backend/target/graphy-next-backend.jar

  # デスクトップ配布物: 各 OS で Electron インストーラをビルド
  desktop:
    name: Desktop (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build backend jar + frontend (Maven 統合)
        shell: bash
        # パッケージング工程はテストをスキップ（テストのゲートは ci.yml が担う）。
        run: cd backend && mvn -B -DskipTests clean package
      - name: Stage desktop resources
        shell: bash
        run: |
          rm -rf desktop/renderer desktop/resources/backend
          mkdir -p desktop/renderer desktop/resources/backend
          cp -r frontend/dist/. desktop/renderer/
          cp backend/target/graphy-next-backend.jar desktop/resources/backend/graphy-next-backend.jar
      - name: Bundle Java 21 runtime (jlink, このOS向け)
        shell: bash
        run: |
          rm -rf desktop/resources/jre
          "$JAVA_HOME/bin/jlink" --add-modules ALL-MODULE-PATH --strip-debug --no-man-pages --no-header-files --output desktop/resources/jre
      - name: Fetch ffmpeg (このOS/アーキ向けのみ)
        shell: bash
        run: |
          os=$(uname -s); arch=$(uname -m)
          case "$os" in Linux) os=linux;; Darwin) os=mac;; *) os=win;; esac
          case "$arch" in x86_64|amd64) arch=x64;; aarch64|arm64) arch=arm64;; *) arch=x64;; esac
          bash scripts/fetch-ffmpeg.sh "$os-$arch"
      - name: Install desktop deps & build installer
        working-directory: desktop
        shell: bash
        # アップロードは softprops が担うため electron-builder 側は publish しない
        # （--publish never＋GH_TOKEN 非注入で app-update.yml 生成/repository 解決を回避）。
        run: |
          npm install
          npm run dist -- --publish never
      - name: Upload installers
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/dist/*.AppImage
            desktop/dist/*.exe
            desktop/dist/*.dmg
