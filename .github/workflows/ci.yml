name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      # テストのゲート。UI 同梱は不要なので frontend はスキップし、3 OS でバックエンドの
      # ビルド＆テストを回す（DICOM 送受信の Windows/POSIX 差異を検出するため）。
      - name: Build & test
        working-directory: backend
        shell: bash
        run: mvn -B -Dfrontend.skip=true clean package

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build
        working-directory: frontend
        run: |
          npm ci || npm install
          npm run build
