<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        height: 100%;
        font-family: system-ui, "Segoe UI", sans-serif;
        background: linear-gradient(160deg, #0b1b2b 0%, #102a43 100%);
        color: #e6edf3;
        user-select: none;
        overflow: hidden;
      }
      .wrap { padding: 22px 26px; height: 100%; box-sizing: border-box; display: flex; flex-direction: column; }
      .brand { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
      .sub { color: #8aa4bd; font-size: 12px; margin-top: 2px; }
      ul { list-style: none; margin: 18px 0 0; padding: 0; flex: 1; overflow: hidden; }
      li { display: flex; align-items: center; gap: 10px; padding: 5px 0; font-size: 13px; }
      .icon { width: 18px; text-align: center; flex: none; }
      .running .icon { color: #6cb6ff; animation: spin 0.9s linear infinite; }
      .ok .icon { color: #3fb950; }
      .error .icon { color: #f85149; }
      .error .msg { color: #f85149; }
      .msg { color: #c9d6e3; }
      .ok .msg { color: #8aa4bd; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .ver { color: #5a7088; font-size: 11px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">GRAPHY-Next</div>
      <div class="sub" id="sub"></div>
      <ul id="steps"></ul>
      <div class="ver">standalone mode</div>
    </div>

    <script>
      // localStorage の言語設定（React 側と共有）で日英切替。
      let locale = "ja";
      try {
        const saved = localStorage.getItem("graphy.locale");
        if (saved === "ja" || saved === "en") locale = saved;
        else if (navigator.language && navigator.language.startsWith("en")) locale = "en";
      } catch (e) {}

      const I18N = {
        ja: {
          sub: "起動しています…",
          init: "起動を開始しています",
          folders: "必要なフォルダを確認しています",
          database: "データベースを確認・マイグレーションしています",
          scp: "DICOM 受信(SCP)を開始しています",
          plugins: "プラグインを読み込んでいます",
          ready: "起動が完了しました",
          error: "起動に失敗しました",
        },
        en: {
          sub: "Starting…",
          init: "Starting up",
          folders: "Checking required folders",
          database: "Checking / migrating the database",
          scp: "Starting DICOM receiver (SCP)",
          plugins: "Loading plugins",
          ready: "Startup complete",
          error: "Startup failed",
        },
      };
      const T = I18N[locale];
      document.getElementById("sub").textContent = T.sub;

      const ul = document.getElementById("steps");
      const ICON = { running: "◴", ok: "✓", error: "✕" };

      function upsert({ step, state, message }) {
        let li = document.querySelector(`li[data-step="${step}"]`);
        if (!li) {
          li = document.createElement("li");
          li.setAttribute("data-step", step);
          li.innerHTML = '<span class="icon"></span><span class="msg"></span>';
          ul.appendChild(li);
        }
        li.className = state || "running";
        li.querySelector(".icon").textContent = ICON[state] || ICON.running;
        // step をローカライズ（未知の step は backend のメッセージにフォールバック）
        li.querySelector(".msg").textContent = T[step] || message || step;
      }

      if (window.graphySplash) {
        window.graphySplash.onProgress(upsert);
      }
    </script>
  </body>
</html>
